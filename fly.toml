# fly.toml app configuration file generated for restaurant-lastsaas on 2026-06-16T18:59:50Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'restaurant-lastsaas'
primary_region = 'iad'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[checks]
  [checks.health]
    port = 8080
    type = 'http'
    interval = '15s'
    timeout = '5s'
    path = '/health'

[[vm]]
  memory = '1024mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
